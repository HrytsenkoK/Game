<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAMELEONS VS HUNTERS - Головне Меню</title>
    <style>
        html {
            --panel-alpha: 0.7;
            font-size: 16px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            background-image: radial-gradient(circle at center, #2a2a4e 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(90deg, #ff007f, #00f0ff, #00ff00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 0px 20px rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 300px;
            transition: opacity 0.3s ease;
        }

        .menu-btn {
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid #00ff00;
            border-radius: 25px;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.2);
        }

        .menu-btn:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 6px 20px rgba(0, 255, 0, 0.6);
            transform: scale(1.05);
        }

        #create-server-menu,
        #find-server-menu,
        #settings-menu {
            display: none;
            width: 80%;
            max-width: 900px;
            background: rgba(0, 0, 0, var(--panel-alpha, 0.7));
            border: 2px solid #00f0ff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            flex-direction: column;
            gap: 20px;
        }

        #find-server-menu {
            width: 90%;
            max-width: 1120px;
        }

        /* ВИПРАВЛЕННЯ: settings-menu тепер використовує flex з обмеженням висоти,
           а overflow застосовується лише до внутрішнього контенту */
        #settings-menu {
            width: 90%;
            max-width: 1180px;
            max-height: 92vh;
            overflow: visible;
            box-sizing: border-box;
            display: none;
            flex-direction: column;
        }

        .form-layout {
            display: flex;
            gap: 40px;
        }

        .search-layout {
            display: grid;
            grid-template-columns: minmax(230px, 0.9fr) minmax(320px, 1.35fr) minmax(260px, 1fr);
            gap: 28px;
        }

        .search-column {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-left, .form-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 0.9rem;
            color: #ccc;
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #555;
            border-radius: 10px;
            padding: 10px 15px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .server-type-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 14px;
            padding: 5px;
        }

        .mode-btn {
            background: rgba(0, 0, 0, 0.45);
            border: 1px solid transparent;
            border-radius: 10px;
            color: #ddd;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            padding: 9px 10px;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #00ff00;
            border-color: #00ff00;
            color: #000;
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.45);
        }

        .private-only.hidden {
            display: none;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #777;
            border-radius: 15px;
            color: #ddd;
            padding: 5px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag-btn:hover, .tag-btn.active {
            background: #00ff00;
            color: #000;
            border-color: #00ff00;
        }

        .search-results {
            min-height: 280px;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(0, 255, 0, 0.28);
            border-radius: 14px;
            padding: 16px;
        }

        .search-results h2 {
            font-size: 1.1rem;
            margin: 0 0 14px;
            color: #f4f4f4;
            letter-spacing: 0;
        }

        .results-list {
            min-height: 220px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
        }

        .empty-results {
            color: rgba(255, 255, 255, 0.62);
            font-weight: bold;
            text-align: center;
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            flex-shrink: 0;
        }

        .action-btn {
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid #00f0ff;
            border-radius: 25px;
            padding: 10px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background-color: #00f0ff;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }

        .confirm-btn {
            border-color: #00ff00;
            width: 100%;
            margin-top: 20px;
        }
        .confirm-btn:hover {
            background-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6);
        }

        .settings-title {
            font-size: 1.6rem;
            margin: 0;
            text-align: center;
            color: #fff;
            letter-spacing: 0;
            flex-shrink: 0;
        }

        .settings-layout {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 24px;
            /* ВИПРАВЛЕННЯ: flex-grow щоб займало доступний простір,
               але не виходило за межі батьківського flex-контейнера */
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
        }

        .settings-nav {
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
        }

        .settings-nav-btn {
            background: rgba(0, 0, 0, 0.72);
            border: 2px solid rgba(0, 255, 0, 0.76);
            border-radius: 8px;
            color: #f5f5f5;
            cursor: pointer;
            font-size: 1.08rem;
            font-weight: 800;
            line-height: 1.2;
            min-height: 48px;
            padding: 10px 14px;
            text-align: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .settings-nav-btn:hover,
        .settings-nav-btn.active {
            background: rgba(0, 255, 0, 0.16);
            border-color: #00ff00;
            box-shadow: 0 0 16px rgba(0, 255, 0, 0.34);
            color: #fff;
        }

        .settings-content {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(0, 240, 255, 0.34);
            border-radius: 14px;
            overflow: hidden;
        }

        .settings-panel {
            display: none;
            grid-template-columns: repeat(2, minmax(240px, 1fr));
            gap: 18px;
            height: 100%;
            max-height: 100%;
            overflow-y: auto;
            padding: 22px;
            box-sizing: border-box;
        }

        .settings-panel.active {
            display: grid;
        }

        .settings-panel h3 {
            color: #fff;
            font-size: 1.25rem;
            grid-column: 1 / -1;
            letter-spacing: 0;
            margin: 0 0 2px;
        }

        .settings-section {
            background: rgba(0, 0, 0, 0.34);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
            padding: 14px;
        }

        .settings-section label {
            color: #ccc;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .settings-row {
            align-items: center;
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .settings-value {
            color: #00f0ff;
            font-weight: 800;
            min-width: 56px;
            text-align: right;
        }

        .settings-range {
            accent-color: #00ff00;
            width: 100%;
        }

        .settings-select,
        .settings-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            color: white;
            font-size: 0.96rem;
            min-width: 0;
            outline: none;
            padding: 10px 12px;
            width: 100%;
        }

        .settings-select:focus,
        .settings-input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.35);
        }

        .settings-select option {
            background: #111;
            color: #fff;
        }

        .settings-toggle {
            align-items: center;
            align-self: flex-start;
            background: rgba(0, 0, 0, 0.64);
            border: 2px solid rgba(0, 255, 0, 0.72);
            border-radius: 999px;
            color: #fff;
            cursor: pointer;
            display: inline-flex;
            font-weight: 800;
            gap: 10px;
            min-width: 128px;
            padding: 8px 14px;
            transition: all 0.2s ease;
        }

        .settings-toggle .toggle-light {
            background: #555;
            border-radius: 50%;
            height: 14px;
            width: 14px;
        }

        .settings-toggle.active {
            background: rgba(0, 255, 0, 0.16);
            border-color: #00ff00;
        }

        .settings-toggle.active .toggle-light {
            background: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        .choice-grid {
            display: grid;
            gap: 8px;
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .choice-grid.two {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .choice-btn,
        .keybind-btn {
            background: rgba(0, 0, 0, 0.58);
            border: 1px solid rgba(0, 255, 0, 0.58);
            border-radius: 8px;
            color: #e8e8e8;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 800;
            min-height: 40px;
            padding: 8px 10px;
            transition: all 0.2s ease;
        }

        .choice-btn:hover,
        .choice-btn.active,
        .keybind-btn:hover,
        .keybind-btn.listening {
            background: #00ff00;
            border-color: #00ff00;
            color: #000;
        }

        .keybind-grid {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .keybind-row {
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            display: grid;
            gap: 8px;
            grid-template-columns: minmax(90px, 1fr) 82px;
            padding: 8px;
        }

        .keybind-row span {
            color: #ddd;
            font-size: 0.9rem;
            font-weight: 700;
            min-width: 0;
        }

        .language-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-start;
            max-width: 100%;
        }

        .lang-btn {
            background: rgba(0, 0, 0, 0.48);
            border: 1px solid #00ff00;
            border-radius: 8px;
            color: #ccc;
            padding: 9px 14px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lang-btn:hover, .lang-btn.active {
            color: white;
            border-color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .lang-btn.active {
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .settings-status {
            align-items: center;
            color: rgba(255, 255, 255, 0.72);
            display: flex;
            font-size: 0.92rem;
            font-weight: 700;
            min-height: 42px;
        }

        .reset-btn {
            border-color: #ff007f;
        }

        .reset-btn:hover {
            background: #ff007f;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.55);
        }

        body.reduced-effects * {
            box-shadow: none !important;
            transition: none !important;
        }

        body.high-contrast {
            background-image: radial-gradient(circle at center, #1b1b1b 0%, #050505 100%);
        }

        body.high-contrast #create-server-menu,
        body.high-contrast #find-server-menu,
        body.high-contrast #settings-menu,
        body.high-contrast .settings-content,
        body.high-contrast .settings-section {
            border-color: #fff;
        }

        @media (max-width: 900px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow: auto;
                padding: 28px 0;
            }

            h1 {
                font-size: 2.35rem;
            }

            .form-layout,
            .search-layout {
                grid-template-columns: 1fr;
                flex-direction: column;
            }

            #settings-menu {
                max-height: none;
                overflow: visible;
            }

            .settings-layout,
            .settings-panel {
                grid-template-columns: 1fr;
            }

            .settings-layout {
                min-height: 0;
            }

            .settings-panel {
                max-height: none;
            }

            .settings-nav {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .choice-grid,
            .choice-grid.two,
            .keybind-grid {
                grid-template-columns: 1fr;
            }

            .language-bar {
                margin-top: 4px;
            }
        }
    </style>
</head>
<body>

    <h1 id="game-title">CHAMELEONS VS HUNTERS</h1>

    <div id="main-menu" class="menu-container">
        <button id="btn-create" class="menu-btn" onclick="openCreateMenu()">Створити сервер</button>
        <button id="btn-find" class="menu-btn" onclick="openFindMenu()">Знайти сервер</button>
        <button id="btn-settings" class="menu-btn" onclick="openSettingsMenu()">Налаштування</button>
        <button id="btn-exit" class="menu-btn">Вийти з гри</button>
    </div>

    <div id="create-server-menu">
        <div class="form-layout">
            <div class="form-left">
                <div class="input-group">
                    <label id="lbl-player-name">Введіть ім'я, яке буде відображатися в грі</label>
                    <input type="text" id="input-player-name" placeholder="SKUNS1K" maxlength="30">
                </div>
                <div class="input-group">
                    <label id="lbl-server-name">Введіть ім'я сервера</label>
                    <input type="text" id="input-server-name" placeholder="Введіть текст" maxlength="25">
                </div>
                <div class="input-group">
                    <label id="lbl-password">Введіть пароль (тільки приватні сервери)</label>
                    <input type="password" id="input-password" placeholder="Введіть текст" maxlength="25">
                </div>
                <div class="input-group">
                    <label id="lbl-max-players">Максимум гравців (1-24)</label>
                    <input type="number" id="input-max-players" value="10" min="1" max="24">
                </div>
            </div>

            <div class="form-right">
                <div class="input-group">
                    <label id="lbl-region-tag">Регіональний тег</label>
                    <div class="tags-container">
                        <button class="tag-btn active" onclick="toggleTag(this)">Європа</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Азія</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Північна Америка</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Не вказано</button>
                    </div>
                </div>
                <div class="input-group">
                    <label id="lbl-server-tag">Тег сервера</label>
                    <div class="tags-container">
                        <button class="tag-btn" onclick="toggleTag(this)">Для задоволення</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Всі вітаються</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Тільки майстри маскування</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Новачки</button>
                    </div>
                </div>
            </div>
        </div>

        <button id="btn-confirm-create" class="action-btn confirm-btn">Створити сервер</button>

        <div class="form-actions">
            <button id="btn-back" class="action-btn" onclick="closeCreateMenu()">Назад</button>
        </div>
    </div>

    <div id="find-server-menu">
        <div class="search-layout">
            <div class="search-column">
                <div class="input-group">
                    <label id="lbl-find-player-name">Введіть ім'я, яке буде відображатися в грі</label>
                    <input type="text" id="input-find-player-name" placeholder="SKUNS1K" maxlength="30">
                </div>
                <div id="find-server-name-field" class="input-group private-only hidden">
                    <label id="lbl-find-server-name">Введіть ім'я сервера</label>
                    <input type="text" id="input-find-server-name" placeholder="Введіть текст" maxlength="25">
                </div>
                <div id="find-password-field" class="input-group private-only hidden">
                    <label id="lbl-find-password">Введіть пароль</label>
                    <input type="password" id="input-find-password" placeholder="Введіть текст" maxlength="25">
                </div>
                <div class="input-group">
                    <label id="lbl-server-type">Тип сервера</label>
                    <div class="server-type-toggle" role="group" aria-label="Тип сервера">
                        <button id="btn-private-server" type="button" class="mode-btn" aria-pressed="false" onclick="setFindServerType('private')">Приватний</button>
                        <button id="btn-public-server" type="button" class="mode-btn active" aria-pressed="true" onclick="setFindServerType('public')">Публічний</button>
                    </div>
                </div>
            </div>

            <div class="search-column">
                <div class="input-group">
                    <label id="lbl-find-region-tag">Регіональний тег</label>
                    <div class="tags-container">
                        <button class="tag-btn active" onclick="toggleTag(this)">Європа</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Азія</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Африка</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Океанія</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Північна Америка</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Південна Америка</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Не вказано</button>
                    </div>
                </div>
                <div class="input-group">
                    <label id="lbl-find-server-tag">Тег сервера</label>
                    <div class="tags-container">
                        <button class="tag-btn" onclick="toggleTag(this)">Україна</button>
                        <button class="tag-btn" onclick="toggleTag(this)">США</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Канада</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Німеччина</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Франція</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Польща</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Туреччина</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Японія</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Корея</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Китай</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Для задоволення</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Всі вітаються</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Тільки майстри маскування</button>
                        <button class="tag-btn" onclick="toggleTag(this)">В основному базовий режим</button>
                        <button class="tag-btn" onclick="toggleTag(this)">В основному режим зараження</button>
                        <button class="tag-btn" onclick="toggleTag(this)">Новачки вітаються</button>
                    </div>
                </div>
            </div>

            <div class="search-results">
                <h2 id="lbl-search-results">Результати пошуку</h2>
                <div id="search-results-list" class="results-list">
                    <div id="empty-results" class="empty-results">Сервери не знайдено</div>
                </div>
            </div>
        </div>

        <button id="btn-confirm-find" class="action-btn confirm-btn">Знайти публічний сервер</button>

        <div class="form-actions">
            <button id="btn-find-back" class="action-btn" onclick="closeFindMenu()">Назад</button>
        </div>
    </div>

    <div id="settings-menu">
        <h2 id="settings-title" class="settings-title">Налаштування</h2>

        <div class="settings-layout">
            <nav class="settings-nav" aria-label="Розділи налаштувань">
                <button id="settings-tab-audio" type="button" class="settings-nav-btn active" onclick="setSettingsTab('audio')">Звук</button>
                <button id="settings-tab-graphics" type="button" class="settings-nav-btn" onclick="setSettingsTab('graphics')">Графіка</button>
                <button id="settings-tab-controls" type="button" class="settings-nav-btn" onclick="setSettingsTab('controls')">Керування</button>
                <button id="settings-tab-gameplay" type="button" class="settings-nav-btn" onclick="setSettingsTab('gameplay')">Гра</button>
                <button id="settings-tab-language" type="button" class="settings-nav-btn" onclick="setSettingsTab('language')">Мова</button>
            </nav>

                playerName: "Introduce el nombre a mostrar en el juego", serverName: "Introduce el nombre del servidor",

                playerName: "Geben Sie den Namen ein, der im Spiel angezeigt wird", serverName: "Servername eingeben",
                password: "Passwort eingeben (nur private Server)", maxPlayers: "Max. Spieler (1-24)",
                regionTag: "Region-Tag", serverTag: "Server-Tag",
                placeholderText: "Text eingeben", back: "Zurück", confirmCreate: "Server erstellen",
                serverType: "Servertyp", privateServer: "Privat", publicServer: "Öffentlich",
                searchResults: "Suchergebnisse", confirmFindPrivate: "Privaten Server finden",
                confirmFindPublic: "Öffentlichen Server finden", noResults: "Keine Server gefunden",

                create: "Créer un Serveur", find: "Trouver un Serveur", settings: "Paramètres", exit: "Quitter",
                playerName: "Entrez le nom à afficher dans le jeu", serverName: "Entrez le nom du serveur",
                password: "Entrez le mot de passe (privé uniquement)", maxPlayers: "Max joueurs (1-24)",
                regionTag: "Balise de région", serverTag: "Balise de serveur",
                placeholderText: "Entrez le texte", back: "Retour", confirmCreate: "Créer un Serveur",
                serverType: "Type de serveur", privateServer: "Privé", publicServer: "Public",
                searchResults: "Résultats de recherche", confirmFindPrivate: "Trouver un serveur privé",
                confirmFindPublic: "Trouver un serveur public", noResults: "Aucun serveur trouvé",
                language: "Langue"
            }
        };

        const SETTINGS_STORAGE_KEY = 'chameleons-vs-hunters-settings';
        const defaultSettings = {
            language: 'uk',
            activeSettingsTab: 'audio',
            masterVolume: 60,
            musicVolume: 50,
            effectsVolume: 75,
            voiceVolume: 70,
            voiceChat: true,
            pushToTalk: false,
            voiceInput: 'default',
            voiceOutput: 'default',
            graphicsQuality: 'medium',
            resolution: '1920x1080',
            windowMode: 'fullscreen',
            fpsLimit: '60',
            brightness: 50,
            uiScale: 100,
            panelOpacity: 70,
            reducedMotion: false,
            highContrast: false,
            mouseSensitivity: 50,
            invertMouse: false,
            playerName: 'SKUNS1K',
            defaultServerType: 'public',
            defaultRegion: 'europe',
            defaultMaxPlayers: 10,
            showHints: true,
            autoReady: false,
            keybinds: {
                forward: 'W',
                backward: 'S',
                left: 'A',
                right: 'D',
                jump: 'Space',
                crouch: 'Ctrl',
                interact: 'E',
                voice: 'V'
            }
        };

        let appSettings = loadStoredSettings();
        let currentLanguage = appSettings.language;
        let findServerType = appSettings.defaultServerType;
        let pendingKeybindAction = null;
        let settingsStatusTimer = null;

        function cloneDefaultSettings() {
            return {
                ...defaultSettings,
                keybinds: { ...defaultSettings.keybinds }
            };
        }

        function mergeSettings(savedSettings) {
            const base = cloneDefaultSettings();
            return {
                ...base,
                ...savedSettings,
                keybinds: {
                    ...base.keybinds,
                    ...(savedSettings.keybinds || {})
                }
            };
        }

        function loadStoredSettings() {
            try {
                const storedSettings = localStorage.getItem(SETTINGS_STORAGE_KEY);
                return storedSettings ? mergeSettings(JSON.parse(storedSettings)) : cloneDefaultSettings();
            } catch (error) {
                return cloneDefaultSettings();
            }
        }

        function saveSettings(showStatus = true) {
            try {
                localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(appSettings));
                if (showStatus) {
                    showSettingsStatus('Налаштування збережено');
                }
            } catch (error) {
                showSettingsStatus('Не вдалося зберегти налаштування');
            }
        }

        function showSettingsStatus(message) {
            const statusElement = document.getElementById('settings-status');
            if (!statusElement) return;

            statusElement.innerText = message;
            clearTimeout(settingsStatusTimer);
            settingsStatusTimer = setTimeout(() => {
                statusElement.innerText = 'Налаштування збережено';
            }, 1400);
        }

        function setText(elementId, value) {
            const element = document.getElementById(elementId);
            if (element) {
                element.innerText = value;
            }
        }

        function setPlaceholder(elementId, value) {
            const element = document.getElementById(elementId);
            if (element) {
                element.placeholder = value;
            }
        }

        function setLanguage(langCode, clickedButton) {
            const texts = translations[langCode] || translations.uk;
            currentLanguage = translations[langCode] ? langCode : 'uk';
            appSettings.language = currentLanguage;

            setText('btn-create', texts.create);
            setText('btn-find', texts.find);
            setText('btn-settings', texts.settings);
            setText('btn-exit', texts.exit);

            setText('lbl-player-name', texts.playerName);
            setText('lbl-server-name', texts.serverName);
            setText('lbl-password', texts.password);
            setText('lbl-max-players', texts.maxPlayers);
            setText('lbl-region-tag', texts.regionTag);
            setText('lbl-server-tag', texts.serverTag);
            setPlaceholder('input-server-name', texts.placeholderText);
            setPlaceholder('input-password', texts.placeholderText);
            setText('btn-back', texts.back);
            setText('btn-confirm-create', texts.confirmCreate);

            setText('lbl-find-player-name', texts.playerName);
            setText('lbl-find-server-name', texts.serverName);
            setText('lbl-find-password', texts.password);
            setText('lbl-find-region-tag', texts.regionTag);
            setText('lbl-find-server-tag', texts.serverTag);
            setText('lbl-server-type', texts.serverType);
            setText('btn-private-server', texts.privateServer);
            setText('btn-public-server', texts.publicServer);
            setText('lbl-search-results', texts.searchResults);
            setText('empty-results', texts.noResults);
            setPlaceholder('input-find-server-name', texts.placeholderText);
            setPlaceholder('input-find-password', texts.placeholderText);
            setText('btn-find-back', texts.back);
            updateFindServerMode();

            setText('settings-title', texts.settings);
            setText('lbl-language', texts.language);
            setText('btn-settings-back', texts.back);

            const langButtons = document.querySelectorAll('.lang-btn');
            langButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === currentLanguage);
            });

            if (clickedButton) {
                saveSettings();
            }
        }

        function setSettingsTab(tabName) {
            appSettings.activeSettingsTab = tabName;

            document.querySelectorAll('.settings-nav-btn').forEach(button => {
                button.classList.toggle('active', button.id === `settings-tab-${tabName}`);
            });

            document.querySelectorAll('.settings-panel').forEach(panel => {
                panel.classList.toggle('active', panel.id === `settings-panel-${tabName}`);
            });

            saveSettings(false);
        }

        function setRangeValue(inputId, valueId, value, suffix = '%') {
            const input = document.getElementById(inputId);
            const valueElement = document.getElementById(valueId);

            if (input) input.value = value;
            if (valueElement) valueElement.innerText = `${value}${suffix}`;
        }

        function setSelectValue(selectId, value) {
            const select = document.getElementById(selectId);
            if (!select) return;

            const hasValue = Array.from(select.options).some(option => option.value === value);
            select.value = hasValue ? value : 'default';
        }

        function setInputValue(inputId, value) {
            const input = document.getElementById(inputId);
            if (input) {
                input.value = value;
            }
        }

        function renderToggle(settingKey) {
            const button = document.getElementById(`toggle-${settingKey}`);
            if (!button) return;

            const isActive = Boolean(appSettings[settingKey]);
            const label = button.querySelector('.toggle-label');
            button.classList.toggle('active', isActive);
            button.setAttribute('aria-pressed', isActive);
            if (label) {
                label.innerText = isActive ? 'Увімкнено' : 'Вимкнено';
            }
        }

        function renderChoiceButtons(settingKey) {
            document.querySelectorAll(`.choice-btn[data-setting="${settingKey}"]`).forEach(button => {
                button.classList.toggle('active', button.dataset.value === String(appSettings[settingKey]));
            });
        }

        function renderKeybinds() {
            Object.keys(appSettings.keybinds).forEach(action => {
                const button = document.getElementById(`key-${action}`);
                if (button) {
                    button.innerText = appSettings.keybinds[action];
                    button.classList.toggle('listening', pendingKeybindAction === action);
                }
            });
        }

        function renderSettings() {
            setRangeValue('setting-master-volume', 'value-masterVolume', appSettings.masterVolume);
            setRangeValue('setting-music-volume', 'value-musicVolume', appSettings.musicVolume);
            setRangeValue('setting-effects-volume', 'value-effectsVolume', appSettings.effectsVolume);
            setRangeValue('setting-voice-volume', 'value-voiceVolume', appSettings.voiceVolume);
            setRangeValue('setting-brightness', 'value-brightness', appSettings.brightness);
            setRangeValue('setting-ui-scale', 'value-uiScale', appSettings.uiScale);
            setRangeValue('setting-panel-opacity', 'value-panelOpacity', appSettings.panelOpacity);
            setRangeValue('setting-mouse-sensitivity', 'value-mouseSensitivity', appSettings.mouseSensitivity);

            setSelectValue('setting-voice-input', appSettings.voiceInput);
            setSelectValue('setting-voice-output', appSettings.voiceOutput);
            setSelectValue('setting-resolution', appSettings.resolution);
            setSelectValue('setting-default-region', appSettings.defaultRegion);
            setInputValue('setting-player-name', appSettings.playerName);
            setInputValue('setting-default-players', appSettings.defaultMaxPlayers);

            [
                'voiceChat',
                'pushToTalk',
                'reducedMotion',
                'highContrast',
                'invertMouse',
                'showHints',
                'autoReady'
            ].forEach(renderToggle);

            [
                'graphicsQuality',
                'windowMode',
                'fpsLimit',
                'defaultServerType'
            ].forEach(renderChoiceButtons);

            renderKeybinds();
            setSettingsTab(appSettings.activeSettingsTab || 'audio');
        }

        function applySettingsToPage() {
            const uiScale = Math.max(80, Math.min(120, Number(appSettings.uiScale))) / 100;
            const panelOpacity = Math.max(45, Math.min(95, Number(appSettings.panelOpacity))) / 100;
            const brightness = 0.75 + (Math.max(0, Math.min(100, Number(appSettings.brightness))) / 100) * 0.5;

            document.documentElement.style.fontSize = `${16 * uiScale}px`;
            document.documentElement.style.setProperty('--panel-alpha', panelOpacity);
            document.body.classList.toggle('reduced-effects', appSettings.reducedMotion || appSettings.graphicsQuality === 'low');
            document.body.classList.toggle('high-contrast', appSettings.highContrast);
            document.body.dataset.quality = appSettings.graphicsQuality;
            document.body.style.filter = `brightness(${brightness})`;

            const playerNameInputs = [
                document.getElementById('input-player-name'),
                document.getElementById('input-find-player-name')
            ];

            playerNameInputs.forEach(input => {
                if (input && !input.value) {
                    input.value = appSettings.playerName;
                }
            });

            const maxPlayersInput = document.getElementById('input-max-players');
            if (maxPlayersInput && !maxPlayersInput.dataset.touched) {
                maxPlayersInput.value = appSettings.defaultMaxPlayers;
            }
        }

        function updateNumberSetting(settingKey, value) {
            let numberValue = Number(value);

            if (settingKey === 'defaultMaxPlayers') {
                numberValue = Math.max(1, Math.min(24, numberValue || defaultSettings.defaultMaxPlayers));
            }

            appSettings[settingKey] = numberValue;
            renderSettings();
            applySettingsToPage();
            saveSettings();
        }

        function updateStringSetting(settingKey, value) {
            appSettings[settingKey] = value;

            if (settingKey === 'playerName') {
                const playerNameInputs = [
                    document.getElementById('input-player-name'),
                    document.getElementById('input-find-player-name')
                ];

                playerNameInputs.forEach(input => {
                    if (input) input.value = value;
                });
            }

            applySettingsToPage();
            saveSettings();
        }

        function setChoiceSetting(settingKey, value) {
            appSettings[settingKey] = value;

            if (settingKey === 'defaultServerType') {
                findServerType = value;
                updateFindServerMode();
            }

            renderSettings();
            applySettingsToPage();
            saveSettings();
        }

        function toggleBooleanSetting(settingKey) {
            appSettings[settingKey] = !appSettings[settingKey];
            renderSettings();
            applySettingsToPage();
            saveSettings();
        }

        function resetSettings() {
            appSettings = cloneDefaultSettings();
            currentLanguage = appSettings.language;
            findServerType = appSettings.defaultServerType;
            pendingKeybindAction = null;
            setLanguage(currentLanguage);
            renderSettings();
            applySettingsToPage();
            updateFindServerMode();
            saveSettings(false);
            showSettingsStatus('Налаштування скинуто');
        }

        function startKeyCapture(action) {
            pendingKeybindAction = action;
            renderKeybinds();

            const button = document.getElementById(`key-${action}`);
            if (button) {
                button.innerText = '...';
                button.classList.add('listening');
            }
        }

        function formatKeyName(event) {
            const keyNames = {
                ' ': 'Space',
                Control: 'Ctrl',
                ArrowUp: 'Up',
                ArrowDown: 'Down',
                ArrowLeft: 'Left',
                ArrowRight: 'Right'
            };

            if (keyNames[event.key]) {
                return keyNames[event.key];
            }

            return event.key.length === 1 ? event.key.toUpperCase() : event.key;
        }

        document.addEventListener('keydown', event => {
            if (!pendingKeybindAction) return;

            event.preventDefault();

            if (event.key === 'Escape') {
                pendingKeybindAction = null;
                renderKeybinds();
                return;
            }

            appSettings.keybinds[pendingKeybindAction] = formatKeyName(event);
            pendingKeybindAction = null;
            renderKeybinds();
            saveSettings();
        });

        async function loadAudioDevices() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) return;

            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                fillDeviceSelect('setting-voice-input', 'voiceInput', devices, 'audioinput', 'Системний мікрофон');
                fillDeviceSelect('setting-voice-output', 'voiceOutput', devices, 'audiooutput', 'Системні динаміки');
            } catch (error) {}
        }

        function fillDeviceSelect(selectId, settingKey, devices, kind, defaultLabel) {
            const select = document.getElementById(selectId);
            if (!select) return;

            const filteredDevices = devices.filter(device => device.kind === kind && device.deviceId);
            if (!filteredDevices.length) return;

            const currentValue = appSettings[settingKey];
            select.innerHTML = `<option value="default">${defaultLabel}</option>`;

            filteredDevices.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.innerText = device.label || `${defaultLabel} ${index + 1}`;
                select.appendChild(option);
            });

            const hasCurrentValue = Array.from(select.options).some(option => option.value === currentValue);
            select.value = hasCurrentValue ? currentValue : 'default';
        }

        function openCreateMenu() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('find-server-menu').style.display = 'none';
            document.getElementById('settings-menu').style.display = 'none';
            document.getElementById('create-server-menu').style.display = 'flex';
        }

        function closeCreateMenu() {
            document.getElementById('create-server-menu').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }

        function openFindMenu() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('create-server-menu').style.display = 'none';
            document.getElementById('settings-menu').style.display = 'none';
            document.getElementById('find-server-menu').style.display = 'flex';
            updateFindServerMode();
        }

        function closeFindMenu() {
            document.getElementById('find-server-menu').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }

        function openSettingsMenu() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('create-server-menu').style.display = 'none';
            document.getElementById('find-server-menu').style.display = 'none';
            document.getElementById('settings-menu').style.display = 'flex';
            renderSettings();
            applySettingsToPage();
        }

        function closeSettingsMenu() {
            document.getElementById('settings-menu').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }

        function setFindServerType(type) {
            findServerType = type;
            updateFindServerMode();
        }

        function updateFindServerMode() {
            const isPrivate = findServerType === 'private';
            const texts = translations[currentLanguage] || translations.uk;
            const privateButton = document.getElementById('btn-private-server');
            const publicButton = document.getElementById('btn-public-server');

            document.getElementById('find-server-name-field').classList.toggle('hidden', !isPrivate);
            document.getElementById('find-password-field').classList.toggle('hidden', !isPrivate);
            document.getElementById('btn-confirm-find').innerText = isPrivate ? texts.confirmFindPrivate : texts.confirmFindPublic;

            privateButton.classList.toggle('active', isPrivate);
            publicButton.classList.toggle('active', !isPrivate);
            privateButton.setAttribute('aria-pressed', isPrivate);
            publicButton.setAttribute('aria-pressed', !isPrivate);
        }

        function toggleTag(button) {
            const container = button.parentElement;
            const buttons = container.querySelectorAll('.tag-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
        }

        function initializeSettings() {
            const maxPlayersInput = document.getElementById('input-max-players');
            if (maxPlayersInput) {
                maxPlayersInput.addEventListener('input', () => {
                    maxPlayersInput.dataset.touched = 'true';
                });
            }

            setLanguage(appSettings.language);
            renderSettings();
            applySettingsToPage();
            updateFindServerMode();
            loadAudioDevices();
        }

        initializeSettings();
    </script>

</body>
</html>
